<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Brilliant Coffee</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
</head>
<body>
  <div class="container auth-page">
    <div class="auth-card" role="main" aria-labelledby="loginTitle">
      <h2 id="loginTitle">Login</h2>

      <div class="form-row">
        <label class="small">Email</label>
        <input id="email" class="input" type="email" placeholder="alex@domain.com" />
      </div>

      <div class="form-row">
        <label class="small">Parolă</label>
        <input id="password" class="input" type="password" placeholder="Parola ta" />
      </div>

      <div style="margin-top:12px">
        <button id="btnLogin" class="btnPrimary" style="width:100%">Login</button>
      </div>

      <div style="margin-top:12px;text-align:center;color:rgba(0,0,0,0.55)">sau</div>

      <div class="oauth-row">
        <button id="btnGoogle" class="oauth-btn google">Login with Google</button>
      </div>

      <div id="status" style="margin-top:12px;color:var(--burgundy)"></div>

      <div style="margin-top:12px;text-align:center" class="small">
        Nu ai cont? <a href="signup.html" id="toSignup">Creează cont</a>
      </div>

      <div style="margin-top:10px;text-align:center">
        <button class="btnGhost" onclick="window.location.href='index.html'">Înapoi</button>
      </div>
    </div>
  </div>

  <script>
  // REPLACE these with your Supabase public values (only anon key)
  const SUPABASE_URL = "https://ozookaqwfzwcalizhlog.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96b29rYXF3Znp3Y2FsaXpobG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjk1MDMsImV4cCI6MjA4ODkwNTUwM30.aZuTNKzg3NqVM3z650oflS5EvENmymejk4ZVm9NCpFI";

  function $id(id){return document.getElementById(id);}
  function toast(msg,ms=2400){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),ms);}

  document.addEventListener('DOMContentLoaded', ()=>{
    if(typeof supabase === 'undefined'){ $id('status').textContent='Eroare: SDK Supabase nu a fost încărcat.'; console.error('supabase missing'); return; }
    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const email = $id('email'), password = $id('password'), btnLogin = $id('btnLogin'), btnGoogle = $id('btnGoogle'), status = $id('status');

    btnLogin.addEventListener('click', async ()=>{
      const e = (email.value||'').trim(), p = password.value;
      if(!e){ status.textContent='Completează email'; email.focus(); return; }
      if(!p){ status.textContent='Completează parola'; password.focus(); return; }
      status.textContent='Conectare...';
      const { data, error } = await supa.auth.signInWithPassword({ email: e, password: p });
      if(error){ status.textContent = 'Eroare: ' + error.message; console.error(error); return; }
      localStorage.setItem('bc_user_email', e);
      toast('Conectat — redirecționare');
      setTimeout(()=> window.location.href = 'index.html', 700);
    });

    btnGoogle.addEventListener('click', async ()=>{
      status.textContent='Redirectare la Google...';
      const { error } = await supa.auth.signInWithOAuth({ provider: 'google' });
      if(error){ status.textContent='OAuth error: '+error.message; console.error(error); }
    });
  });
  </script>
</body>
</html>
