<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Brilliant Coffee — Auth (fixed)</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#0b1020; --bg2:#121428; --muted:#9aa0b4; --accent1:#FFD166; --accent2:#FF8FAB; --white:#fff;
      --shadow: 0 16px 40px rgba(0,0,0,0.6);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,system-ui;background:linear-gradient(180deg,var(--bg1),var(--bg2)); color:var(--white);-webkit-font-smoothing:antialiased}
    .wrap{max-width:1100px;margin:48px auto;padding:20px}
    .grid{display:grid;grid-template-columns:1fr 420px;gap:28px;align-items:center}
    @media (max-width:980px){ .grid{grid-template-columns:1fr; padding:12px} }
    .brand{display:flex;gap:14px;align-items:center;margin-bottom:18px}
    .logo{width:84px;height:84px;border-radius:16px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center}
    .lead{ color:var(--muted); margin-top:6px; font-size:14px; max-width:520px }
    .mascotWrap{border-radius:18px;padding:28px;box-shadow:var(--shadow);min-height:360px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.03)}
    .tabs{display:flex;gap:8px;margin-top:12px}
    .tab{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted);border:1px solid transparent;cursor:pointer;font-weight:600}
    .tab.active{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#111;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
    .form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .small{font-size:13px;color:var(--muted)}
    input{padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.15);color:var(--white);outline:none}
    .actions{display:flex;gap:10px;margin-top:6px}
    .btn{flex:1;padding:12px 14px;border-radius:12px;border:0;cursor:pointer;font-weight:700;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#111}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}
    .socials{display:flex;gap:8px;margin-top:12px}
    .socialBtn{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700}
    .profile{display:flex;align-items:center;gap:12px;margin-top:12px}
    .avatar{width:56px;height:56px;border-radius:12px;background:linear-gradient(180deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;color:#111;font-weight:800}
    .toast{position:fixed;right:18px;bottom:18px;background:#111;padding:10px 14px;border-radius:10px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,0.6)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo" aria-hidden="true"><svg width="46" height="46" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="10" width="48" height="36" rx="8" fill="#fff" opacity="0.08"/><circle cx="32" cy="28" r="10" fill="#3f2a23"/></svg></div>
      <div>
        <h1>BRILLIANT COFFEE</h1>
        <div class="lead">Login with email or Google to access your profile, points and rewards.</div>
      </div>
    </div>

    <div class="grid" role="main">
      <div class="mascotWrap" aria-hidden="true">
        <svg viewBox="0 0 600 400" style="width:360px;height:320px"><defs><linearGradient id="g1"><stop offset="0" stop-color="#FFD166"/><stop offset="1" stop-color="#FF8FAB"/></linearGradient></defs><g transform="translate(300,200)"><circle r="120" fill="url(#g1)" opacity="0.12"/><rect x="-58" y="-6" width="116" height="64" rx="12" fill="#3f2a23"/></g></svg>
      </div>

      <div class="card" role="region" aria-label="Authentication">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <h2 id="cardTitle">Login</h2>
            <div class="small">Secure access — email & Google</div>
            <div class="tabs" role="tablist" aria-label="Auth tabs" style="margin-top:10px">
              <button class="tab active" id="tabLogin" data-tab="login" role="tab" aria-selected="true">Login</button>
              <button class="tab" id="tabSignup" data-tab="signup" role="tab" aria-selected="false">Sign up</button>
            </div>
          </div>
          <div class="small" style="text-align:right">Built with Supabase • Production-ready</div>
        </div>

        <form id="authForm" class="form" onsubmit="return false" aria-live="polite" style="margin-top:12px">
          <label class="small" for="emailInput">Email</label>
          <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="you@domain.com" required />
          <label class="small" for="passwordInput">Password</label>
          <input id="passwordInput" type="password" minlength="6" autocomplete="current-password" placeholder="••••••" />

          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
            <div class="small">Or use a magic link (passwordless)</div>
            <button type="button" id="magicLinkBtn" class="btn ghost" style="padding:8px 10px">Send magic link</button>
          </div>

          <div class="actions" style="margin-top:10px">
            <button type="button" id="primaryBtn" class="btn">Login</button>
            <button type="button" id="secondaryBtn" class="btn ghost">Sign up</button>
          </div>

          <div class="socials">
            <div class="small">Or continue with</div>
            <div style="display:flex;gap:8px;width:280px;">
              <div class="socialBtn" id="googleBtn" title="Continue with Google" aria-label="Continue with Google">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M21 12.3c0-.8-.1-1.6-.4-2.3H12v4.2h4.6c-.2 1.2-.9 2.3-1.9 3l3 2.4c1.8-1.7 3-4.2 3-7.3z"/><path fill="#34A853" d="M12 22c2.7 0 4.9-.9 6.6-2.6l-3-2.4c-.8.6-1.9 1-3.6 1-2.8 0-5.2-1.9-6.1-4.4l-3 2.3C6.1 19.9 8.8 22 12 22z"/><path fill="#4A90E2" d="M5.9 13.9A7 7 0 0 1 5.9 12c0-.6.1-1.1.2-1.6L3.2 7.9A10.9 10.9 0 0 0 2 12c0 1.6.3 3.1.9 4.5l3-2.6z"/><path fill="#FBBC05" d="M12 6.5c1.5 0 2.9.5 4 1.5l3-3C16.8 3 14.7 2 12 2 8.8 2 6.1 4.1 3.9 7.3l3 2.3C6.8 8.1 9.2 6.5 12 6.5z"/></svg>
                <span style="font-weight:700">Google</span>
              </div>
            </div>
          </div>

          <div class="small" style="margin-top:12px;text-align:center">By continuing you agree to our <a href="#" style="color:var(--accent1)">Terms</a> & <a href="#" style="color:var(--accent1)">Privacy</a>.</div>
        </form>

        <div id="profileArea" style="display:none" class="profile" aria-live="polite">
          <div class="avatar" id="avatarChar">B</div>
          <div>
            <div id="displayName">Guest</div>
            <div class="small" id="userEmail">—</div>
            <div style="margin-top:6px">Points: <strong id="userPoints">0</strong></div>
          </div>
          <div style="margin-left:auto">
            <button id="logoutBtn" class="btn ghost">Logout</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toasts"></div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // your keys (you gave these)
    const SUPABASE_URL = "https://ozookaqwfzwcalizhlog.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96b29rYXF3Znp3Y2FsaXpobG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjk1MDMsImV4cCI6MjA4ODkwNTUwM30.aZuTNKzg3NqVM3z650oflS5EvENmymejk4ZVm9NCpFI";

    if(typeof supabase === 'undefined'){
      alert('Supabase SDK not loaded. Check CDN.');
      throw new Error('Supabase not loaded');
    }
    // -> CORRECT: create client in different variable name
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM refs
    const $ = id => document.getElementById(id);
    const tabLogin = $('tabLogin'), tabSignup = $('tabSignup');
    const emailInput = $('emailInput'), passwordInput = $('passwordInput');
    const primaryBtn = $('primaryBtn'), secondaryBtn = $('secondaryBtn'), magicLinkBtn = $('magicLinkBtn');
    const googleBtn = $('googleBtn'), profileArea = $('profileArea');
    const avatarChar = $('avatarChar'), displayName = $('displayName'), userEmail = $('userEmail'), userPoints = $('userPoints'), logoutBtn = $('logoutBtn');
    const cardTitle = $('cardTitle');

    function toast(msg, ms=2600){
      const t = document.createElement('div'); t.className='toast'; t.textContent = msg; $('toasts').appendChild(t);
      setTimeout(()=> t.remove(), ms);
    }

    // tab toggle
    function setTab(tab){
      document.querySelectorAll('.tab').forEach(x=> x.classList.remove('active'));
      tab.classList.add('active');
      const mode = tab.dataset.tab;
      if(mode === 'login'){ cardTitle.textContent = 'Login'; primaryBtn.textContent = 'Login'; secondaryBtn.textContent = 'Sign up'; }
      else { cardTitle.textContent = 'Create account'; primaryBtn.textContent = 'Sign up'; secondaryBtn.textContent = 'Login'; }
    }
    tabLogin.addEventListener('click', ()=> setTab(tabLogin));
    tabSignup.addEventListener('click', ()=> setTab(tabSignup));

    // upsert profile helpers using supabaseClient
    async function upsertProfile(user){
      if(!user || !user.id) return;
      try{ await supabaseClient.from('profiles').upsert({ id: user.id, email: user.email }, { onConflict: 'id' }); }
      catch(e){ console.warn('profile upsert failed', e); }
    }
    async function getProfile(userId){
      if(!userId) return null;
      try{
        const { data, error } = await supabaseClient.from('profiles').select('id,email,display_name,points').eq('id', userId).single().maybeSingle();
        if(error){ console.warn('profile fetch', error); return null; }
        return data;
      }catch(e){ console.error(e); return null; }
    }

    // Email sign up
    async function doSignUp(email, password){
      if(!email || !password){ toast('Enter email & password'); return; }
      primaryBtn.disabled = true;
      try{
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if(error){ toast('Sign up error: ' + error.message); console.error(error); primaryBtn.disabled=false; return; }
        toast('Account created. Check email if confirmation enabled.');
        if(data?.user) await upsertProfile(data.user);
      }catch(e){ console.error(e); toast('Sign up failed'); }
      primaryBtn.disabled = false;
    }

    // Email login
    async function doLogin(email, password){
      if(!email || !password){ toast('Enter email & password'); return; }
      primaryBtn.disabled = true;
      try{
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if(error){ toast('Login error: ' + error.message); console.error(error); primaryBtn.disabled=false; return; }
        toast('Logged in');
      }catch(e){ console.error(e); toast('Login failed'); }
      primaryBtn.disabled = false;
    }

    // Magic link
    async function sendMagicLink(email){
      if(!email){ toast('Enter email for magic link'); return; }
      magicLinkBtn.disabled = true;
      try{
        const { data, error } = await supabaseClient.auth.signInWithOtp({ email });
        if(error){ toast('Magic link error: ' + error.message); console.error(error); magicLinkBtn.disabled=false; return; }
        toast('Magic link sent. Check email.');
      }catch(e){ console.error(e); toast('Magic link failed'); }
      magicLinkBtn.disabled = false;
    }

    // Google OAuth
    async function doGoogle(){
      try{
        const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
        if(error){ toast('OAuth error: ' + error.message); console.error(error); return; }
        toast('Redirecting to Google...');
      }catch(e){ console.error(e); toast('OAuth failed'); }
    }

    // Sign out
    async function doLogout(){
      try{
        const { error } = await supabaseClient.auth.signOut();
        if(error){ toast('Logout error: ' + error.message); console.error(error); return; }
        toast('Signed out');
        renderLoggedOut();
      }catch(e){ console.error(e); }
    }

    // event binds
    primaryBtn.addEventListener('click', ()=>{
      const active = document.querySelector('.tab.active').dataset.tab;
      const email = emailInput.value.trim();
      const pass = passwordInput.value;
      if(active === 'login') doLogin(email, pass); else doSignUp(email, pass);
    });
    secondaryBtn.addEventListener('click', ()=>{
      const active = document.querySelector('.tab.active');
      setTab(active.dataset.tab === 'login' ? tabSignup : tabLogin);
    });
    magicLinkBtn.addEventListener('click', ()=> sendMagicLink(emailInput.value.trim()));
    googleBtn.addEventListener('click', doGoogle);
    logoutBtn.addEventListener('click', doLogout);

    // auth state listener using supabaseClient
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      console.log('auth event', event);
      if(event === 'SIGNED_IN' || event === 'USER_UPDATED'){
        const user = session.user;
        await upsertProfile(user);
        const profile = await getProfile(user.id);
        renderProfile(profile, user);
        toast('Welcome ' + (user.email || '').split('@')[0]);
      } else if(event === 'SIGNED_OUT'){
        renderLoggedOut();
      }
    });

    // init on load
    (async function init(){
      try{
        const { data } = await supabaseClient.auth.getSession();
        if(data?.session?.user){
          const user = data.session.user;
          await upsertProfile(user);
          const profile = await getProfile(user.id);
          renderProfile(profile, user);
        } else renderLoggedOut();
      }catch(e){ console.error('init err', e); renderLoggedOut(); }
    })();

    // render helpers
    function renderProfile(profile, user){
      profileArea.style.display = 'flex';
      displayName.textContent = profile?.display_name || (user?.email || '').split('@')[0] || 'User';
      userEmail.textContent = user?.email || profile?.email || '';
      avatarChar.textContent = (displayName.textContent || 'B').charAt(0).toUpperCase();
      userPoints.textContent = String(profile?.points ?? 0);
      document.getElementById('authForm').style.display = 'none';
    }
    function renderLoggedOut(){
      profileArea.style.display = 'none';
      document.getElementById('authForm').style.display = 'block';
      displayName.textContent = 'Guest';
      userEmail.textContent = '—';
      avatarChar.textContent = 'B';
      userPoints.textContent = '0';
    }

    // default
    setTab(tabLogin);

    console.log('Auth UI loaded. Supabase URL:', SUPABASE_URL);
  </script>
</body>
</html>
